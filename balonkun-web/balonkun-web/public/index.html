  <style>
    /* Material Symbols — required CSS for icon rendering */
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;

    }
    [class*="material-symbols"], [class*="material-icons"] {

    }

    /* Animated Filling Underline */
    .nav-link-underline {
      position: relative;
      text-decoration: none !important;
    }
    .nav-link-underline::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: var(--primary);
      transform: scaleX(0);
      transition: transform 0.3s ease-out;
    }
    .nav-link-underline:hover::after {
      transform: scaleX(1);
    }

    :root {
      --canvas: #f3f1eb;
      --surface: #ffffff;
      --surface-soft: #f8f7f3;
      --ink: #151d19;
      --muted: #5f6c63;
      --accent: #ffb200;
      --accent-deep: #d49006;
      --brand: #2d4739;
      --line: #e8e4db;
      --shadow-soft: 0 12px 35px -18px rgba(22, 31, 26, 0.34);
      --shadow-strong: 0 24px 56px -24px rgba(18, 28, 23, 0.42);
    }

    .theme-premium {
      background:
        radial-gradient(1100px 560px at -10% -20%, rgba(255, 178, 0, 0.18), transparent 60%),
        radial-gradient(900px 460px at 110% 5%, rgba(45, 71, 57, 0.12), transparent 60%),
        var(--canvas);
      color: var(--ink);
      scroll-behavior: smooth;
    }

    .js-reveal {
      opacity: 0;
      transform: translateY(28px) scale(0.985);
      transition: opacity 0.72s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.72s cubic-bezier(0.22, 1, 0.36, 1);
      transition-delay: var(--reveal-delay, 0ms);
      will-change: transform, opacity;
    }

    .js-reveal.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(34px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.95s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .finder-panel::before {
      content: "";
      position: absolute;
      left: 1px;
      right: 1px;
      top: 0;
      height: 4px;
      background: #ffb200;
      border-top-left-radius: 1.5rem;
      border-top-right-radius: 1.5rem;
    }

    /* Handle transitions for categories */
    .cat-transition {
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
  </style>
